name: Deploy API

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_ROOT: /opt/elysia-api
      RELEASE_NAME: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Configure known hosts
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Package release
        run: |
          mkdir -p .deploy
          tar -czf .deploy/release.tgz dist package.json package-lock.json ecosystem.config.cjs certs

      - name: Upload release archive
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$APP_ROOT/releases' '$APP_ROOT/shared'"
          scp -P "$DEPLOY_PORT" .deploy/release.tgz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/elysia-api-$RELEASE_NAME.tgz"

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        run: |
          ENV_B64=$(printf '%s' "$DEPLOY_ENV_FILE" | base64 -w 0)
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "APP_ROOT='$APP_ROOT' RELEASE_NAME='$RELEASE_NAME' ENV_B64='$ENV_B64' bash -s" <<'EOF'
          set -euo pipefail
          RELEASE_DIR="$APP_ROOT/releases/$RELEASE_NAME"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          tar -xzf "/tmp/elysia-api-$RELEASE_NAME.tgz" -C "$RELEASE_DIR"
          printf '%s' "$ENV_B64" | base64 -d > "$APP_ROOT/shared/.env"
          ln -sfn "$APP_ROOT/shared/.env" "$RELEASE_DIR/.env"
          cd "$RELEASE_DIR"
          npm ci --omit=dev
          ln -sfn "$RELEASE_DIR" "$APP_ROOT/current"
          cd "$APP_ROOT/current"
          pm2 startOrReload ecosystem.config.cjs --update-env
          pm2 save
          rm -f "/tmp/elysia-api-$RELEASE_NAME.tgz"
          EOF
